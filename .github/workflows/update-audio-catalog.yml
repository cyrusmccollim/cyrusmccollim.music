name: Update Audio Catalog

on:
  push:
    paths:
      - 'files/audio/**'

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rebuild index.html JSON
        run: node .github/scripts/update-catalog.js

      - name: Commit and Push
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if ! git diff --exit-code index.html > /dev/null; then
            git add index.html
            git commit -m "Update audio track catalog"
            git push
          fi
